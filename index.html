<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Скачиватель</title>
    <!-- Подключение официального скрипта взаимодействия с Telegram -->
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }
        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { margin-bottom: 20px; color: var(--tg-theme-button-color, #2481cc); }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            color: var(--tg-theme-text-color, #000000);
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📥 Личный Скачиватель</h2>
        <p>Вставьте ссылку на видео (YouTube, VK, TikTok, Rutube):</p>
        <input type="text" id="videoUrl" placeholder="https://... ">
        <button onclick="sendLinkToBot()">Скачать видео через бота</button>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function sendLinkToBot() {
            const url = document.getElementById('videoUrl').value.trim();
            if (!url) return alert('Пожалуйста, вставьте ссылку!');
            
            // Отправляем ссылку текстовым сообщением обратно в чат бота
            tg.sendData(url);
            
            // Автоматически закрываем мини-приложение, чтобы вернуться в чат
            tg.close();
        }
    </script>
</body>
</html>
